server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass         https://api-production-65ad.up.railway.app/;
        proxy_ssl_server_name on;
        proxy_set_header   Host api-production-65ad.up.railway.app;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass            https://api-production-65ad.up.railway.app/ws;
        proxy_ssl_server_name on;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host api-production-65ad.up.railway.app;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss: https://tile.openstreetmap.org https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org; worker-src blob:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' blob:; frame-ancestors 'none';";
}
