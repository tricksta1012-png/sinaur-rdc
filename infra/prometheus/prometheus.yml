global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project:     sinaur-rdc

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # configurer alertmanager si nécessaire

scrape_configs:

  - job_name: api
    static_configs:
      - targets: ['api:3000']
        labels:
          service: api

  - job_name: sync-gateway
    static_configs:
      - targets: ['sync-gateway:3003']
        labels:
          service: sync-gateway

  - job_name: alerting
    static_configs:
      - targets: ['alerting:3001']
        labels:
          service: alerting

  - job_name: ussd
    static_configs:
      - targets: ['ussd:3002']
        labels:
          service: ussd

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
