worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"duration":$request_time,'
    '"upstream":"$upstream_addr",'
    '"referer":"$http_referer",'
    '"ua":"$http_user_agent"}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens   off;

  # ── Compression ──────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;

  # ── Rate limiting global ──────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=public_api:10m  rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m        rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ── Upstream ─────────────────────────────────────────────────────────────────
  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  upstream sync_backend {
    server sync-gateway:3003;
    keepalive 16;
  }

  upstream ussd_backend {
    server ussd:3002;
    keepalive 8;
  }

  upstream command_center {
    server command-center:80;
  }

  upstream public_portal {
    server public:80;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS principal — API & WebSocket ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.sinaur-rdc.cd;

    ssl_certificate     /etc/nginx/certs/sinaur-rdc.crt;
    ssl_certificate_key /etc/nginx/certs/sinaur-rdc.key;
    include /etc/nginx/ssl-params.conf;

    # ── En-têtes de sécurité ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header X-Frame-Options           "DENY"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    client_max_body_size 10m;
    limit_conn conn_limit 20;

    # ── WebSocket /ws ─────────────────────────────────────────────────────────
    location /ws {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── Auth (rate limit strict) ──────────────────────────────────────────────
    location ~ ^/auth/(login|refresh|otp) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ── API générale ──────────────────────────────────────────────────────────
    location / {
      limit_req zone=api_global burst=30 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }

  # ── Sync Gateway ──────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name sync.sinaur-rdc.cd;

    ssl_certificate     /etc/nginx/certs/sinaur-rdc.crt;
    ssl_certificate_key /etc/nginx/certs/sinaur-rdc.key;
    include /etc/nginx/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 5m;

    location / {
      limit_req zone=api_global burst=60 nodelay;
      proxy_pass http://sync_backend;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ── Portail public ────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name sinaur-rdc.cd www.sinaur-rdc.cd;

    ssl_certificate     /etc/nginx/certs/sinaur-rdc.crt;
    ssl_certificate_key /etc/nginx/certs/sinaur-rdc.key;
    include /etc/nginx/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://tile.openstreetmap.org; connect-src 'self' https://api.sinaur-rdc.cd;" always;

    root /usr/share/nginx/html/public;

    # Cache assets statiques
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Proxy vers l'API pour les routes /public/*
    location /public/ {
      limit_req zone=public_api burst=20 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      proxy_pass http://public_portal;
      proxy_set_header Host $host;
    }
  }

  # ── Centre de commandement (accès restreint réseau) ───────────────────────────
  server {
    listen 443 ssl;
    server_name cc.sinaur-rdc.cd;

    ssl_certificate     /etc/nginx/certs/sinaur-rdc.crt;
    ssl_certificate_key /etc/nginx/certs/sinaur-rdc.key;
    include /etc/nginx/ssl-params.conf;

    # Restriction IP — réseau interne gouvernemental uniquement
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss: https://api.sinaur-rdc.cd;" always;

    location / {
      proxy_pass http://command_center;
      proxy_set_header Host $host;
    }
  }

  # ── USSD (carrier IP uniquement) ──────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name ussd.sinaur-rdc.cd;

    ssl_certificate     /etc/nginx/certs/sinaur-rdc.crt;
    ssl_certificate_key /etc/nginx/certs/sinaur-rdc.key;
    include /etc/nginx/ssl-params.conf;

    # Restreindre aux IPs des carriers Africa's Talking
    # allow <AT_IP_RANGE>;
    # deny all;

    location /ussd {
      proxy_pass http://ussd_backend;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      proxy_pass http://ussd_backend;
    }
  }
}
