name: Deploy to Railway

on:
  # Déclenché après que le workflow Docker ait réussi (nouvelles images disponibles)
  workflow_run:
    workflows: [Docker]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    # Ne déployer que si le workflow Docker a réussi (ou si déclenché manuellement)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service:
          - name: api
            service_id_secret: RAILWAY_SERVICE_API_ID
            dockerfile: apps/api/Dockerfile
          - name: ai-prediction
            service_id_secret: RAILWAY_SERVICE_AI_ID
            dockerfile: services/ai-prediction/Dockerfile
          - name: command-center
            service_id_secret: RAILWAY_SERVICE_CC_ID
            dockerfile: apps/command-center/Dockerfile
          - name: public
            service_id_secret: RAILWAY_SERVICE_PUBLIC_ID
            dockerfile: apps/public/Dockerfile
          - name: alerting
            service_id_secret: RAILWAY_SERVICE_ALERTING_ID
            dockerfile: services/alerting/Dockerfile
          - name: ingestion
            service_id_secret: RAILWAY_SERVICE_INGESTION_ID
            dockerfile: services/ingestion/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets[matrix.service.service_id_secret] }}
          DOCKERFILE: ${{ matrix.service.dockerfile }}
        run: |
          if [ -n "$SERVICE_ID" ]; then
            printf '[build]\nbuilder = "DOCKERFILE"\ndockerfilePath = "%s"\n' "$DOCKERFILE" > railway.toml
            railway up --service "$SERVICE_ID" --detach
          else
            echo "⚠️  ${{ matrix.service.name }}: secret ${{ matrix.service.service_id_secret }} not set, skipping."
          fi
