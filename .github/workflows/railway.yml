name: Deploy to Railway

on:
  workflow_run:
    workflows: [Docker]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - name: api
            service_id_secret: RAILWAY_SERVICE_API_ID
            cmd: 'node apps/api/dist/index.js'
          - name: ai-prediction
            service_id_secret: RAILWAY_SERVICE_AI_ID
            cmd: 'uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info'
          - name: command-center
            service_id_secret: RAILWAY_SERVICE_CC_ID
            cmd: ''
          - name: public
            service_id_secret: RAILWAY_SERVICE_PUBLIC_ID
            cmd: ''
          - name: alerting
            service_id_secret: RAILWAY_SERVICE_ALERTING_ID
            cmd: 'node services/alerting/dist/index.js'
          - name: agent9-ingestion
            service_id_secret: RAILWAY_SERVICE_AGENT9_ID
            cmd: 'node services/agent9-ingestion/dist/index.js'

    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets[matrix.service.service_id_secret] }}
          SERVICE: ${{ matrix.service.name }}
          SERVICE_CMD: ${{ matrix.service.cmd }}
        run: |
          if [ -n "$SERVICE_ID" ]; then
            SHA=$(git rev-parse --short HEAD)
            DEPLOY_DIR=$(mktemp -d)

            echo "FROM matroschka/sinaur-rdc-${SERVICE}:sha-${SHA}" > "$DEPLOY_DIR/Dockerfile"

            # railway.toml : DOCKERFILE builder + startCommand natif Railway
            # (startCommand override Nixpacks même en mode DOCKERFILE)
            echo '[build]'                        > "$DEPLOY_DIR/railway.toml"
            echo 'builder = "DOCKERFILE"'        >> "$DEPLOY_DIR/railway.toml"
            echo 'dockerfilePath = "Dockerfile"' >> "$DEPLOY_DIR/railway.toml"
            if [ -n "$SERVICE_CMD" ]; then
              echo '[deploy]'                     >> "$DEPLOY_DIR/railway.toml"
              echo "startCommand = \"${SERVICE_CMD}\"" >> "$DEPLOY_DIR/railway.toml"
            fi

            cd "$DEPLOY_DIR"
            railway up --service "$SERVICE_ID" --detach
          else
            echo "Warning: secret ${{ matrix.service.service_id_secret }} not set, skipping $SERVICE"
          fi
