name: Docker

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: matroschka/sinaur-rdc

jobs:
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: sync-gateway
            context: .
            dockerfile: services/sync-gateway/Dockerfile
          - service: alerting
            context: .
            dockerfile: services/alerting/Dockerfile
          - service: ussd
            context: .
            dockerfile: services/ussd/Dockerfile
          - service: ai-prediction
            context: services/ai-prediction
            dockerfile: services/ai-prediction/Dockerfile
          - service: command-center
            context: .
            dockerfile: apps/command-center/Dockerfile
          - service: public
            context: apps/public
            dockerfile: apps/public/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
