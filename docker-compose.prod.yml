version: '3.9'

# Compose de production SINAUR-RDC.
# Usage : docker compose -f docker-compose.prod.yml up -d
# Secrets via fichier .env.prod (ne jamais versionner).
#
# Différences vs docker-compose.yml (dev) :
#   - Ports DB/Redis non exposés à l'hôte
#   - Limites mémoire sur tous les services
#   - Prometheus + Grafana inclus
#   - Redémarrage automatique garanti
#   - Aucun profil : tous les services démarrent

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  networks:
    - sinaur-internal

services:

  # ── Données ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sinaur-postgres
    <<: *service-defaults
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-sinaur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       sinaur_rdc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sinaur} -d sinaur_rdc']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sinaur-redis
    <<: *service-defaults
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 600m
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Services applicatifs ──────────────────────────────────────────────────────

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-api:${IMAGE_TAG:-latest}
    container_name: sinaur-api
    <<: *service-defaults
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:    ${JWT_SECRET}
      NODE_ENV:      production
      API_PORT:      3000
      RELIEFWEB_APP_NAME: sinaur-rdc
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    ports:
      - '${API_PORT_HOST:-127.0.0.1:3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  sync-gateway:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-sync-gateway:${IMAGE_TAG:-latest}
    container_name: sinaur-sync-gateway
    <<: *service-defaults
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379
      API_BASE_URL:  http://api:3000
      JWT_SECRET:    ${JWT_SECRET}
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    ports:
      - '${SYNC_PORT_HOST:-127.0.0.1:3003}:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  alerting:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-alerting:${IMAGE_TAG:-latest}
    container_name: sinaur-alerting
    <<: *service-defaults
    environment:
      DATABASE_URL:               postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      API_BASE_URL:               http://api:3000
      AI_BASE_URL:                http://ai-prediction:8000
      ALERTING_SERVICE_URL:       http://alerting:3001
      FIREBASE_PROJECT_ID:        ${FIREBASE_PROJECT_ID:-sinaur-rdc}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase_sa
      SMS_GATEWAY_URL:            ${SMS_GATEWAY_URL}
      SMS_GATEWAY_API_KEY:        ${SMS_GATEWAY_API_KEY}
      AUTO_ALERT_SCORE_THRESHOLD: ${AUTO_ALERT_SCORE_THRESHOLD:-75}
      LOG_LEVEL:                  ${LOG_LEVEL:-info}
    secrets:
      - firebase_sa
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  ussd:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-ussd:${IMAGE_TAG:-latest}
    container_name: sinaur-ussd
    <<: *service-defaults
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      API_BASE_URL:  http://api:3000
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    ports:
      - '${USSD_PORT_HOST:-127.0.0.1:3002}:3002'
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  ai-prediction:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-ai-prediction:${IMAGE_TAG:-latest}
    container_name: sinaur-ai
    <<: *service-defaults
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}
    volumes:
      - ai_models:/app/model_store
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  ingestion:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-ingestion:${IMAGE_TAG:-latest}
    container_name: sinaur-ingestion
    <<: *service-defaults
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-sinaur}:${POSTGRES_PASSWORD}@postgres:5432/sinaur_rdc
      RELIEFWEB_APP_NAME:    sinaur-rdc
      LOG_LEVEL:             ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Frontends ─────────────────────────────────────────────────────────────────

  command-center:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-command-center:${IMAGE_TAG:-latest}
    container_name: sinaur-command-center
    <<: *service-defaults
    ports:
      - '${CC_PORT_HOST:-127.0.0.1:8081}:80'
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m

  public:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER}/sinaur-rdc-public:${IMAGE_TAG:-latest}
    container_name: sinaur-public
    <<: *service-defaults
    ports:
      - '${PUBLIC_PORT_HOST:-0.0.0.0:8080}:80'
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: sinaur-nginx
    <<: *service-defaults
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      sync-gateway:
        condition: service_started
      command-center:
        condition: service_started
      public:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Observabilité ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sinaur-prometheus
    <<: *service-defaults
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '${PROM_PORT_HOST:-127.0.0.1:9090}:9090'
    deploy:
      resources:
        limits:
          memory: 512m

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sinaur-grafana
    <<: *service-defaults
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL:         ${GRAFANA_ROOT_URL:-http://localhost:3500}
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT_HOST:-127.0.0.1:3500}:3000'
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m

secrets:
  firebase_sa:
    file: ${FIREBASE_SERVICE_ACCOUNT_PATH:-./infra/secrets/firebase-sa.json}

networks:
  sinaur-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ai_models:
  prometheus_data:
  grafana_data:
  nginx_logs:
